name: CI

# Runs on every push to ANY branch (solo branch-per-issue workflow, D16 —
# branch pushes are the backstop; PRs are ad-hoc so we don't double-run on them).
on:
  push:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Static checks + app build (no backend needed)
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # pnpm (version comes from the "packageManager" field in package.json)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check (Prettier)
        run: pnpm format:check

      - name: Lint (token contract + Next rules)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          # Public, build-inlined Supabase vars — NOT secrets (they ship to the
          # browser; RLS protects the data, same values stack-tests hardcodes).
          # `NEXT_PUBLIC_*` is baked in at build, and `/` statically prerenders a
          # browser client, so the build needs *some* value present or it throws
          # ("URL and API key are required"). This job only typechecks/compiles
          # the bundle, so a placeholder is fine — every real build (Vercel prod/
          # preview) injects the true values.
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH

  # Boots the real local Supabase stack:
  #  1. migration replay + seed on a fresh Postgres (the IaC reproducibility gate)
  #  2. pgTAP RLS/grants suite (supabase/tests)
  #  3. Playwright e2e against the prod build (magic link via Mailpit → groups)
  stack-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase stack (fresh migration replay + seed)
        run: supabase start -x studio,imgproxy,vector,logflare

      - name: RLS + grants tests (pgTAP)
        run: |
          set -o pipefail
          if ! supabase test db 2>&1 | tee /tmp/pgtap.log; then
            echo "::group::pgTAP failure detail"
            grep -nE "not ok|Failed test|ERROR:|DETAIL:|CONTEXT:|Bail out|# +have|# +want|Looks like" /tmp/pgtap.log \
              | while IFS= read -r line; do echo "::error::pgTAP: ${line}"; done
            echo "::endgroup::"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      # Well-known shared local-dev keys (identical on every machine — not secrets)
      - name: Point the app at the CI stack
        run: |
          cat > .env.local <<'EOF'
          NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH
          NEXT_PUBLIC_AUTH_EMAIL=1
          EOF

      - name: Build
        run: pnpm build

      - name: E2E (Playwright)
        run: pnpm test:e2e
